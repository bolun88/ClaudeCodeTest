<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 3px;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.5em;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      animation: pulse 0.6s ease infinite alternate;
    }

    @keyframes pulse {
      from { transform: scale(1); }
      to   { transform: scale(1.08); }
    }

    #restart {
      margin-top: 2rem;
      padding: 0.6rem 2rem;
      font-size: 1rem;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.2s, transform 0.1s;
    }

    #restart:hover { background: #c73652; transform: scale(1.05); }

    #score {
      display: flex;
      gap: 2rem;
      margin-bottom: 1.5rem;
      font-size: 1rem;
      color: #888;
    }

    #score span { text-align: center; }
    #score strong { display: block; font-size: 1.6rem; color: #eee; }
    .score-x strong { color: #e94560; }
    .score-o strong { color: #a8dadc; }
  </style>
</head>
<body>

<h1>TIC TAC TOE</h1>

<div id="score">
  <span class="score-x">X <strong id="scoreX">0</strong></span>
  <span>Draws <strong id="scoreD">0</strong></span>
  <span class="score-o">O <strong id="scoreO">0</strong></span>
</div>

<div id="status">Player X's turn</div>

<div id="board">
  <div class="cell" data-i="0"></div>
  <div class="cell" data-i="1"></div>
  <div class="cell" data-i="2"></div>
  <div class="cell" data-i="3"></div>
  <div class="cell" data-i="4"></div>
  <div class="cell" data-i="5"></div>
  <div class="cell" data-i="6"></div>
  <div class="cell" data-i="7"></div>
  <div class="cell" data-i="8"></div>
</div>

<button id="restart">New Game</button>

<script>
  const cells   = document.querySelectorAll('.cell');
  const status  = document.getElementById('status');
  const restart = document.getElementById('restart');
  const scoreX  = document.getElementById('scoreX');
  const scoreO  = document.getElementById('scoreO');
  const scoreD  = document.getElementById('scoreD');

  const WINS = [
    [0,1,2],[3,4,5],[6,7,8], // rows
    [0,3,6],[1,4,7],[2,5,8], // cols
    [0,4,8],[2,4,6]          // diags
  ];

  let board, current, gameOver, scores = {X:0, O:0, D:0};

  function init() {
    board    = Array(9).fill('');
    current  = 'X';
    gameOver = false;
    cells.forEach(c => {
      c.textContent = '';
      c.className   = 'cell';
    });
    status.textContent = `Player X's turn`;
  }

  function checkWinner() {
    for (const [a,b,c] of WINS) {
      if (board[a] && board[a] === board[b] && board[a] === board[c]) {
        return { winner: board[a], line: [a,b,c] };
      }
    }
    if (board.every(v => v)) return { winner: 'draw' };
    return null;
  }

  cells.forEach(cell => {
    cell.addEventListener('click', () => {
      const i = +cell.dataset.i;
      if (gameOver || board[i]) return;

      board[i]         = current;
      cell.textContent = current;
      cell.classList.add(current.toLowerCase(), 'taken');

      const result = checkWinner();
      if (result) {
        gameOver = true;
        if (result.winner === 'draw') {
          status.textContent = "It's a draw!";
          scores.D++;
          scoreD.textContent = scores.D;
        } else {
          status.textContent = `Player ${result.winner} wins!`;
          result.line.forEach(idx => cells[idx].classList.add('win'));
          scores[result.winner]++;
          scoreX.textContent = scores.X;
          scoreO.textContent = scores.O;
        }
      } else {
        current = current === 'X' ? 'O' : 'X';
        status.textContent = `Player ${current}'s turn`;
      }
    });
  });

  restart.addEventListener('click', init);

  init();
</script>
</body>
</html>
