<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CYBER SIEGE</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  overflow: hidden;
  font-family: 'Courier New', monospace;
}
#wrap {
  position: relative;
  width: 800px;
  height: 600px;
  transform-origin: top left;
}
canvas {
  display: block;
  cursor: crosshair;
  image-rendering: pixelated;
}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c" width="800" height="600"></canvas>
</div>
<script>
// ─── Canvas & scaling ────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const W = 800, H = 600;
let scale = 1;

function resize() {
  scale = Math.min(window.innerWidth / W, window.innerHeight / H);
  const wrap = document.getElementById('wrap');
  wrap.style.transform = `scale(${scale})`;
  wrap.style.left = ((window.innerWidth  - W * scale) / 2) + 'px';
  wrap.style.top  = ((window.innerHeight - H * scale) / 2) + 'px';
  wrap.style.position = 'fixed';
}
window.addEventListener('resize', resize);
resize();

// ─── Constants ───────────────────────────────────────────────────────────────
const COL = {
  BG:         '#0a0a0f',
  GRID:       '#0e0e18',
  PLAYER:     '#00ff88',
  PLAYER_DIM: '#007744',
  BULLET:     '#ffff00',
  EBULLET:    '#ff4444',
  GRUNT:      '#ff2266',
  RUNNER:     '#ff6600',
  TANK:       '#aa00ff',
  HUD:        '#00ffcc',
  TITLE:      '#ff2266',
};

// ─── Input ───────────────────────────────────────────────────────────────────
const keys = {};
let mouseX = W/2, mouseY = H/2, mouseDown = false;

window.addEventListener('keydown', e => { keys[e.code] = true; });
window.addEventListener('keyup',   e => { keys[e.code] = false; });

canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouseX = (e.clientX - r.left) / scale;
  mouseY = (e.clientY - r.top)  / scale;
});
canvas.addEventListener('mousedown', () => { mouseDown = true; });
canvas.addEventListener('mouseup',   () => { mouseDown = false; });
window.addEventListener('keydown', e => {
  if (e.code === 'Enter') onEnter();
});

// ─── State machine ───────────────────────────────────────────────────────────
const STATE = { MENU: 0, PLAYING: 1, LEVEL_COMPLETE: 2, GAME_OVER: 3 };
let state = STATE.MENU;
let levelCompleteTimer = 0;
const LEVEL_PAUSE = 3;

function onEnter() {
  if (state === STATE.MENU) startGame();
  else if (state === STATE.LEVEL_COMPLETE) nextLevel();
  else if (state === STATE.GAME_OVER) state = STATE.MENU;
}

// ─── Score ───────────────────────────────────────────────────────────────────
const scoreSystem = {
  score: 0,
  high:  parseInt(localStorage.getItem('cybersiege_hi') || '0'),
  add(v) { this.score += v; if (this.score > this.high) this.high = this.score; },
  saveHigh() { localStorage.setItem('cybersiege_hi', this.high); },
  reset() { this.score = 0; }
};

// ─── Screen shake ────────────────────────────────────────────────────────────
const screenShake = {
  mag: 0, dur: 0, maxDur: 0,
  trigger(m, d) { if (m > this.mag) { this.mag = m; this.dur = this.maxDur = d; } },
  update(dt) { if (this.dur > 0) this.dur = Math.max(0, this.dur - dt); },
  apply(ctx) {
    if (this.dur <= 0) return;
    const t = this.dur / this.maxDur;
    const ox = (Math.random()*2-1) * this.mag * t;
    const oy = (Math.random()*2-1) * this.mag * t;
    ctx.translate(ox, oy);
  }
};

// ─── Particles ───────────────────────────────────────────────────────────────
const particles = [];

function spawnExplosion(x, y, color, count=14) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 60 + Math.random() * 140;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 0.5 + Math.random() * 0.4,
      maxLife: 0,
      size: 2 + Math.random() * 4,
      color,
      alive: true
    });
    particles[particles.length-1].maxLife = particles[particles.length-1].life;
  }
}

function spawnSpark(x, y, color) {
  for (let i = 0; i < 4; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 40 + Math.random() * 80;
    particles.push({
      x, y,
      vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed,
      life: 0.2 + Math.random()*0.2, maxLife: 0,
      size: 1 + Math.random()*2,
      color, alive: true
    });
    particles[particles.length-1].maxLife = particles[particles.length-1].life;
  }
}

function updateParticles(dt) {
  for (const p of particles) {
    if (!p.alive) continue;
    p.x  += p.vx * dt;
    p.y  += p.vy * dt;
    p.vx *= Math.pow(0.92, dt*60);
    p.vy *= Math.pow(0.92, dt*60);
    p.life -= dt;
    if (p.life <= 0) p.alive = false;
  }
  filterAlive(particles);
}

function drawParticles() {
  for (const p of particles) {
    const t = p.life / p.maxLife;
    ctx.globalAlpha = t;
    ctx.fillStyle = p.color;
    const s = p.size * t;
    ctx.fillRect(p.x - s/2, p.y - s/2, s, s);
  }
  ctx.globalAlpha = 1;
}

// ─── Bullets ─────────────────────────────────────────────────────────────────
const bullets = [];

function spawnBullet(x, y, angle, speed, damage, fromEnemy, color) {
  bullets.push({ x, y, angle, speed, damage, fromEnemy, color,
    vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, alive: true, r: 5 });
}

function updateBullets(dt) {
  for (const b of bullets) {
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    if (b.x < -20 || b.x > W+20 || b.y < -20 || b.y > H+20) b.alive = false;
  }
  filterAlive(bullets);
}

function drawBullets() {
  ctx.save();
  for (const b of bullets) {
    ctx.shadowColor = b.color;
    ctx.shadowBlur  = 10;
    ctx.fillStyle   = b.color;
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate(b.angle);
    if (b.fromEnemy) {
      ctx.beginPath();
      ctx.arc(0, 0, 4, 0, Math.PI*2);
      ctx.fill();
    } else {
      ctx.fillRect(-9, -2, 18, 4);
    }
    ctx.restore();
  }
  ctx.shadowBlur = 0;
  ctx.restore();
}

// ─── Player ──────────────────────────────────────────────────────────────────
class Player {
  constructor() {
    this.x = W/2; this.y = H/2;
    this.speed = 180;
    this.hp = 100; this.maxHp = 100;
    this.aimAngle = 0;
    this.fireTimer = 0;
    this.fireRate = 1/6.67;
    this.animTimer = 0;
    this.animFrame = 0;
    this.moving = false;
    this.invTimer = 0;
    this.r = 14;
    this.alive = true;
  }

  update(dt) {
    // Movement
    let dx = 0, dy = 0;
    if (keys['ArrowLeft']  || keys['KeyA']) dx -= 1;
    if (keys['ArrowRight'] || keys['KeyD']) dx += 1;
    if (keys['ArrowUp']    || keys['KeyW']) dy -= 1;
    if (keys['ArrowDown']  || keys['KeyS']) dy += 1;
    this.moving = (dx !== 0 || dy !== 0);
    if (this.moving) {
      const len = Math.sqrt(dx*dx + dy*dy);
      this.x += (dx/len) * this.speed * dt;
      this.y += (dy/len) * this.speed * dt;
    }
    this.x = Math.max(this.r, Math.min(W - this.r, this.x));
    this.y = Math.max(this.r, Math.min(H - this.r, this.y));

    // Aim
    this.aimAngle = Math.atan2(mouseY - this.y, mouseX - this.x);

    // Animate legs
    if (this.moving) {
      this.animTimer += dt;
      if (this.animTimer >= 0.15) { this.animTimer = 0; this.animFrame ^= 1; }
    }

    // Fire
    if (mouseDown) {
      this.fireTimer -= dt;
      if (this.fireTimer <= 0) {
        this.fireTimer = this.fireRate;
        const bx = this.x + Math.cos(this.aimAngle) * 18;
        const by = this.y + Math.sin(this.aimAngle) * 18;
        spawnBullet(bx, by, this.aimAngle, 500, 10, false, COL.BULLET);
      }
    } else {
      this.fireTimer = 0;
    }

    // Invincibility
    if (this.invTimer > 0) this.invTimer -= dt;
  }

  takeDamage(dmg) {
    if (this.invTimer > 0) return;
    this.hp -= dmg;
    this.invTimer = 0.5;
    screenShake.trigger(8, 0.3);
    if (this.hp <= 0) { this.hp = 0; this.alive = false; }
  }

  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.aimAngle);

    // Flash when invincible
    const flash = this.invTimer > 0 && Math.floor(this.invTimer * 10) % 2 === 0;
    const col   = flash ? COL.PLAYER_DIM : COL.PLAYER;

    // Legs
    const legY = 8;
    const legOff0 = this.animFrame === 0 ? -3 : 2;
    const legOff1 = this.animFrame === 0 ? 2  : -3;
    ctx.fillStyle = col;
    ctx.fillRect(-4, legY + legOff0, 5, 8);
    ctx.fillRect( 1, legY + legOff1, 5, 8);

    // Body
    ctx.fillStyle = col;
    ctx.fillRect(-7, -8, 14, 16);

    // Gun barrel
    ctx.fillStyle = '#88ffcc';
    ctx.fillRect(6, -2, 12, 4);

    // Head
    ctx.fillStyle = col;
    ctx.shadowColor = COL.PLAYER;
    ctx.shadowBlur  = 8;
    ctx.beginPath();
    ctx.arc(2, -9, 6, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Eye
    ctx.fillStyle = '#001a0a';
    ctx.beginPath();
    ctx.arc(5, -10, 2.5, 0, Math.PI*2);
    ctx.fill();

    ctx.restore();
  }
}

// ─── Enemy ───────────────────────────────────────────────────────────────────
const ENEMY_TYPES = {
  grunt:  { hp: 30,  speed: 80,  color: COL.GRUNT,  score: 10, r: 13, ranged: false },
  runner: { hp: 15,  speed: 150, color: COL.RUNNER,  score: 15, r: 10, ranged: false },
  tank:   { hp: 120, speed: 40,  color: COL.TANK,   score: 40, r: 18, ranged: true  },
};

class Enemy {
  constructor(type, x, y) {
    const d = ENEMY_TYPES[type];
    this.type     = type;
    this.x = x; this.y = y;
    this.hp       = d.hp;
    this.maxHp    = d.hp;
    this.speed    = d.speed;
    this.color    = d.color;
    this.score    = d.score;
    this.r        = d.r;
    this.ranged   = d.ranged;
    this.alive    = true;
    this.animTimer= 0;
    this.animFrame= 0;
    this.fireTimer= 2 + Math.random()*2;
    this.angle    = 0;
    this.damaged  = false;
    this.damagedTimer = 0;
  }

  update(dt, player) {
    const dx = player.x - this.x;
    const dy = player.y - this.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    this.angle = Math.atan2(dy, dx);
    if (dist > 1) {
      this.x += (dx/dist) * this.speed * dt;
      this.y += (dy/dist) * this.speed * dt;
    }

    // Walk animation
    this.animTimer += dt;
    if (this.animTimer >= 0.12) { this.animTimer = 0; this.animFrame = (this.animFrame+1)%4; }

    // Damage flash
    if (this.damagedTimer > 0) this.damagedTimer -= dt;

    // Tank fires
    if (this.ranged) {
      this.fireTimer -= dt;
      if (this.fireTimer <= 0) {
        this.fireTimer = 2 + Math.random()*1.5;
        spawnBullet(this.x, this.y, this.angle, 200, 8, true, COL.EBULLET);
      }
    }
  }

  takeDamage(dmg) {
    this.hp -= dmg;
    this.damagedTimer = 0.1;
    if (this.hp <= 0) { this.hp = 0; this.alive = false; }
  }

  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle);

    const legSwing = Math.sin(this.animFrame * Math.PI/2) * 4;
    const flash    = this.damagedTimer > 0;
    const col      = flash ? '#ffffff' : this.color;

    if (this.type === 'grunt') this._drawGrunt(col, legSwing);
    else if (this.type === 'runner') this._drawRunner(col, legSwing);
    else this._drawTank(col, legSwing);

    ctx.restore();

    // Health bar (only when damaged)
    if (this.hp < this.maxHp) {
      const bw = this.r * 2 + 6;
      const bx = this.x - bw/2;
      const by = this.y - this.r - 8;
      ctx.fillStyle = '#333';
      ctx.fillRect(bx, by, bw, 4);
      ctx.fillStyle = this.color;
      ctx.fillRect(bx, by, bw * (this.hp/this.maxHp), 4);
    }
  }

  _drawGrunt(col, legSwing) {
    ctx.fillStyle = col;
    // Legs
    ctx.fillRect(-3,  8 + legSwing, 5, 8);
    ctx.fillRect( 1,  8 - legSwing, 5, 8);
    // Arms
    ctx.fillRect(-12, -4, 7, 5);
    ctx.fillRect(  7, -4, 7, 5);
    // Body
    ctx.fillRect(-6, -8, 13, 16);
    // Head + eye
    ctx.shadowColor = col;
    ctx.shadowBlur  = 6;
    ctx.beginPath();
    ctx.arc(0, -11, 7, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(3, -12, 3, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#300';
    ctx.beginPath();
    ctx.arc(4, -12, 1.5, 0, Math.PI*2);
    ctx.fill();
  }

  _drawRunner(col, legSwing) {
    ctx.fillStyle = col;
    // Speed blur
    ctx.globalAlpha = 0.25;
    ctx.fillRect(-16, -3, 10, 6);
    ctx.fillRect(-10, -2, 6,  4);
    ctx.globalAlpha = 1;
    // Slim legs
    ctx.fillRect(-2,  7 + legSwing*1.4, 4, 9);
    ctx.fillRect( 0,  7 - legSwing*1.4, 4, 9);
    // Slim body
    ctx.fillRect(-4, -7, 9, 14);
    // Big head
    ctx.shadowColor = col;
    ctx.shadowBlur  = 8;
    ctx.beginPath();
    ctx.arc(1, -10, 8, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
    // Big eye
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(5, -11, 4, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#300';
    ctx.beginPath();
    ctx.arc(6, -11, 2, 0, Math.PI*2);
    ctx.fill();
  }

  _drawTank(col, legSwing) {
    ctx.fillStyle = col;
    // Heavy legs / stomp
    ctx.fillRect(-6, 10 + Math.abs(legSwing)*0.5, 8, 10);
    ctx.fillRect( 2, 10 - Math.abs(legSwing)*0.5, 8, 10);
    // Body - wide armored
    ctx.fillRect(-13, -10, 26, 20);
    // Shoulder plates
    ctx.fillRect(-18, -8, 7, 12);
    ctx.fillRect( 13, -8, 7, 12);
    // Gun nozzle
    ctx.fillStyle = '#660099';
    ctx.fillRect(13, -3, 14, 6);
    // Head
    ctx.fillStyle = col;
    ctx.shadowColor = col;
    ctx.shadowBlur  = 10;
    ctx.fillRect(-8, -18, 17, 10);
    ctx.shadowBlur = 0;
    // Dual eyes
    ctx.fillStyle = '#ff0000';
    ctx.beginPath();
    ctx.arc(-3, -14, 3, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc( 5, -14, 3, 0, Math.PI*2);
    ctx.fill();
  }
}

// ─── Wave / level system ─────────────────────────────────────────────────────
const wave = {
  level: 1,
  queue: [],
  spawnTimer: 0,
  spawnInterval: 1.5,
  enemiesRemaining: 0,

  buildSpawnQueue(n) {
    const q = [];
    const base = 5 + n * 3;
    for (let i = 0; i < base; i++) q.push('grunt');
    if (n >= 2) { const rc = Math.floor(n * 1.5); for (let i=0;i<rc;i++) q.push('runner'); }
    if (n >= 3) { const tc = Math.floor(n * 0.8); for (let i=0;i<tc;i++) q.push('tank'); }
    // Shuffle
    for (let i = q.length-1; i > 0; i--) {
      const j = Math.floor(Math.random()*(i+1));
      [q[i], q[j]] = [q[j], q[i]];
    }
    return q;
  },

  startLevel(n) {
    this.level   = n;
    this.queue   = this.buildSpawnQueue(n);
    this.enemiesRemaining = this.queue.length;
    this.spawnTimer   = 0;
    this.spawnInterval = Math.max(0.4, 1.5 - n * 0.08);
  },

  update(dt) {
    if (this.queue.length === 0) return;
    this.spawnTimer -= dt;
    if (this.spawnTimer <= 0) {
      this.spawnTimer = this.spawnInterval;
      const type = this.queue.shift();
      const [x, y] = randomEdgePos();
      enemies.push(new Enemy(type, x, y));
    }
  },

  isComplete() {
    return this.queue.length === 0 && enemies.length === 0;
  }
};

function randomEdgePos() {
  const side = Math.floor(Math.random()*4);
  if (side === 0) return [Math.random()*W, -20];
  if (side === 1) return [Math.random()*W, H+20];
  if (side === 2) return [-20, Math.random()*H];
  return [W+20, Math.random()*H];
}

// ─── Game data ───────────────────────────────────────────────────────────────
let player  = new Player();
const enemies = [];

// ─── Collision ───────────────────────────────────────────────────────────────
function circleOverlap(ax, ay, ar, bx, by, br) {
  const dx = ax-bx, dy = ay-by;
  return dx*dx + dy*dy < (ar+br)*(ar+br);
}

function filterAlive(arr) {
  let j = 0;
  for (let i = 0; i < arr.length; i++) if (arr[i].alive) arr[j++] = arr[i];
  arr.length = j;
}

function handleCollisions() {
  // Player bullets vs enemies
  for (const b of bullets) {
    if (b.fromEnemy || !b.alive) continue;
    for (const e of enemies) {
      if (!e.alive) continue;
      if (circleOverlap(b.x, b.y, b.r, e.x, e.y, e.r)) {
        spawnSpark(b.x, b.y, e.color);
        e.takeDamage(b.damage);
        b.alive = false;
        if (!e.alive) {
          scoreSystem.add(e.score);
          wave.enemiesRemaining--;
          spawnExplosion(e.x, e.y, e.color, 18);
        }
        break;
      }
    }
  }

  // Enemies vs player (melee)
  for (const e of enemies) {
    if (!e.alive) continue;
    if (circleOverlap(e.x, e.y, e.r, player.x, player.y, player.r)) {
      player.takeDamage(12);
      // Knockback enemy away
      const dx = e.x - player.x, dy = e.y - player.y;
      const dist = Math.sqrt(dx*dx+dy*dy) || 1;
      e.x += (dx/dist)*20;
      e.y += (dy/dist)*20;
    }
  }

  // Enemy bullets vs player
  for (const b of bullets) {
    if (!b.fromEnemy || !b.alive) continue;
    if (circleOverlap(b.x, b.y, b.r, player.x, player.y, player.r)) {
      player.takeDamage(b.damage);
      spawnSpark(b.x, b.y, COL.EBULLET);
      b.alive = false;
    }
  }
}

// ─── Drawing helpers ─────────────────────────────────────────────────────────
function drawBackground() {
  ctx.fillStyle = COL.BG;
  ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = COL.GRID;
  ctx.lineWidth = 1;
  ctx.globalAlpha = 0.5;
  for (let x = 0; x <= W; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y <= H; y += 40) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

function drawScanlines() {
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  for (let y = 0; y < H; y += 4) {
    ctx.fillRect(0, y, W, 2);
  }
}

function drawHUD() {
  ctx.fillStyle = COL.HUD;
  ctx.font = 'bold 14px "Courier New"';

  // Score
  ctx.fillText(`SCORE: ${scoreSystem.score}`, 10, 20);
  ctx.fillText(`HI: ${scoreSystem.high}`, 10, 38);

  // Level
  ctx.textAlign = 'center';
  ctx.fillText(`WAVE ${wave.level}`, W/2, 20);
  ctx.textAlign = 'left';

  // Enemies left
  ctx.textAlign = 'right';
  ctx.fillText(`ENEMIES: ${enemies.length + wave.queue.length}`, W-10, 20);
  ctx.textAlign = 'left';

  // Health bar
  const bw = 160, bh = 14, bx = 10, by = H-30;
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(bx, by, bw, bh);
  const hpFrac = Math.max(0, player.hp / player.maxHp);
  const hpColor = hpFrac > 0.5 ? '#00ff88' : hpFrac > 0.25 ? '#ffaa00' : '#ff2244';
  ctx.fillStyle = hpColor;
  ctx.fillRect(bx, by, bw * hpFrac, bh);
  ctx.strokeStyle = COL.HUD;
  ctx.lineWidth = 1;
  ctx.strokeRect(bx, by, bw, bh);
  ctx.fillStyle = COL.HUD;
  ctx.font = '10px "Courier New"';
  ctx.fillText(`HP ${player.hp}/${player.maxHp}`, bx+4, by+bh-3);
}

// ─── Menu pulse ───────────────────────────────────────────────────────────────
let menuPulse = 0;

function drawMenu() {
  ctx.fillStyle = COL.BG;
  ctx.fillRect(0, 0, W, H);
  drawScanlines();

  // Grid
  ctx.strokeStyle = '#1a1a2e';
  ctx.lineWidth = 1;
  for (let x = 0; x <= W; x += 40) {
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
  }
  for (let y = 0; y <= H; y += 40) {
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
  }

  menuPulse += 0.05;
  const p = 0.7 + Math.sin(menuPulse) * 0.3;

  // Title glow
  ctx.save();
  ctx.shadowColor = COL.TITLE;
  ctx.shadowBlur  = 30 * p;
  ctx.fillStyle   = COL.TITLE;
  ctx.font        = `bold ${Math.floor(62 * p + 10)}px "Courier New"`;
  ctx.textAlign   = 'center';
  ctx.fillText('CYBER', W/2, 200);
  ctx.fillText('SIEGE', W/2, 270);
  ctx.restore();

  // Subtitle
  ctx.fillStyle = COL.HUD;
  ctx.font      = '16px "Courier New"';
  ctx.textAlign = 'center';
  ctx.fillText('TOP-DOWN SHOOTER', W/2, 315);

  // Controls hint
  ctx.fillStyle = '#446655';
  ctx.font      = '13px "Courier New"';
  ctx.fillText('WASD / ARROWS  -  move', W/2, 380);
  ctx.fillText('MOUSE  -  aim & shoot', W/2, 400);

  // High score
  ctx.fillStyle = COL.HUD;
  ctx.font      = '14px "Courier New"';
  ctx.fillText(`HI-SCORE: ${scoreSystem.high}`, W/2, 440);

  // Blinking start
  if (Math.floor(menuPulse * 2) % 2 === 0) {
    ctx.fillStyle = '#fff';
    ctx.font      = 'bold 18px "Courier New"';
    ctx.fillText('[ PRESS ENTER TO START ]', W/2, 510);
  }
  ctx.textAlign = 'left';
}

function drawLevelComplete() {
  // Dim world
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0,0,W,H);

  ctx.textAlign = 'center';
  ctx.fillStyle = COL.HUD;
  ctx.font      = 'bold 42px "Courier New"';
  ctx.shadowColor = COL.HUD;
  ctx.shadowBlur  = 20;
  ctx.fillText('WAVE CLEAR!', W/2, H/2 - 40);
  ctx.shadowBlur = 0;
  ctx.font       = '18px "Courier New"';
  ctx.fillStyle  = '#fff';
  ctx.fillText(`SCORE: ${scoreSystem.score}`, W/2, H/2 + 10);
  const rem = Math.ceil(levelCompleteTimer);
  ctx.fillStyle = '#888';
  ctx.font      = '14px "Courier New"';
  ctx.fillText(`Next wave in ${rem}s  [ ENTER to skip ]`, W/2, H/2 + 50);
  ctx.textAlign = 'left';
  ctx.shadowBlur = 0;
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0,0,W,H);

  ctx.textAlign  = 'center';
  ctx.fillStyle  = COL.TITLE;
  ctx.font       = 'bold 54px "Courier New"';
  ctx.shadowColor = COL.TITLE;
  ctx.shadowBlur  = 25;
  ctx.fillText('GAME OVER', W/2, H/2 - 60);
  ctx.shadowBlur  = 0;

  ctx.fillStyle = COL.HUD;
  ctx.font      = '20px "Courier New"';
  ctx.fillText(`SCORE: ${scoreSystem.score}`, W/2, H/2 - 10);
  ctx.fillText(`WAVE REACHED: ${wave.level}`, W/2, H/2 + 22);

  if (scoreSystem.score >= scoreSystem.high && scoreSystem.score > 0) {
    ctx.fillStyle = '#ffff00';
    ctx.font      = 'bold 16px "Courier New"';
    ctx.fillText('NEW HIGH SCORE!', W/2, H/2 + 55);
  } else {
    ctx.fillStyle = '#666';
    ctx.font      = '14px "Courier New"';
    ctx.fillText(`HI-SCORE: ${scoreSystem.high}`, W/2, H/2 + 55);
  }

  ctx.fillStyle = '#fff';
  ctx.font      = '16px "Courier New"';
  ctx.fillText('[ PRESS ENTER ]', W/2, H/2 + 100);
  ctx.textAlign = 'left';
  ctx.shadowBlur = 0;
}

// ─── Start / next level ──────────────────────────────────────────────────────
function startGame() {
  scoreSystem.reset();
  player = new Player();
  enemies.length = 0;
  bullets.length = 0;
  particles.length = 0;
  wave.startLevel(1);
  state = STATE.PLAYING;
}

function nextLevel() {
  player.hp = Math.min(player.maxHp, player.hp + 25);
  enemies.length = 0;
  bullets.length = 0;
  wave.startLevel(wave.level + 1);
  state = STATE.PLAYING;
}

// ─── Game loop ───────────────────────────────────────────────────────────────
let lastTime = 0;
let accumulator = 0;
const FIXED_DT = 1/60;

function loop(ts) {
  requestAnimationFrame(loop);
  let raw = (ts - lastTime) / 1000;
  lastTime = ts;
  if (raw > 0.1) raw = 0.1;  // Cap to avoid spiral-of-death

  if (state === STATE.MENU) {
    drawMenu();
    return;
  }

  accumulator += raw;
  while (accumulator >= FIXED_DT) {
    tick(FIXED_DT);
    accumulator -= FIXED_DT;
  }

  render();
}

function tick(dt) {
  if (state === STATE.PLAYING) {
    screenShake.update(dt);
    player.update(dt);
    wave.update(dt);
    for (const e of enemies) e.update(dt, player);
    updateBullets(dt);
    updateParticles(dt);
    handleCollisions();
    filterAlive(enemies);
    filterAlive(bullets);

    if (!player.alive) {
      scoreSystem.saveHigh();
      state = STATE.GAME_OVER;
    } else if (wave.isComplete()) {
      scoreSystem.saveHigh();
      state = STATE.LEVEL_COMPLETE;
      levelCompleteTimer = LEVEL_PAUSE;
    }
  } else if (state === STATE.LEVEL_COMPLETE) {
    levelCompleteTimer -= dt;
    screenShake.update(dt);
    updateParticles(dt);
    if (levelCompleteTimer <= 0) nextLevel();
  }
}

function render() {
  ctx.save();
  screenShake.apply(ctx);
  drawBackground();
  drawParticles();
  drawBullets();
  for (const e of enemies) e.draw();
  player.draw();
  ctx.restore();

  drawScanlines();
  drawHUD();

  if (state === STATE.LEVEL_COMPLETE) drawLevelComplete();
  else if (state === STATE.GAME_OVER)  drawGameOver();
}

// ─── Kick off ────────────────────────────────────────────────────────────────
requestAnimationFrame(ts => { lastTime = ts; requestAnimationFrame(loop); });
</script>
